<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Pro - Encuentra tu estancia ideal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-200 py-4 px-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-3xl font-black tracking-tighter">
                    <span class="text-blue-600">tri</span><span class="text-orange-500">va</span><span class="text-red-500">go</span>
                </span>
                <span class="text-xs font-bold text-gray-400 ml-2 uppercase tracking-widest border-l pl-2 border-gray-300">Hotel Pro</span>
            </div>
            <div class="flex gap-4 items-center">
                <button class="text-sm font-semibold text-gray-600 hover:text-blue-600">Favoritos</button>
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition">Iniciar sesión</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        
        <div class="bg-white p-2 rounded-xl shadow-lg border border-gray-100 flex flex-col md:flex-row gap-2 mb-10 mt-[-20px] md:mt-[-40px] relative z-10">
            <div class="flex-1 p-3 border-r border-gray-100">
                <label class="block text-[10px] uppercase font-bold text-gray-400">Destino</label>
                <input type="text" placeholder="¿A dónde vas?" class="w-full outline-none font-semibold text-gray-700" value="Popayán, Colombia">
            </div>
            <div class="flex-1 p-3 border-r border-gray-100">
                <label class="block text-[10px] uppercase font-bold text-gray-400">Fechas</label>
                <p class="font-semibold text-gray-700">Seleccionar fechas</p>
            </div>
            <button class="bg-blue-600 text-white px-10 py-4 rounded-lg font-bold text-lg hover:bg-blue-700 transition">Buscar</button>
        </div>

        <h2 class="text-2xl font-extrabold mb-6 flex items-center gap-2">
            Resultados de búsqueda
            <span class="text-sm font-normal text-gray-400 bg-gray-100 px-2 py-1 rounded">Basado en disponibilidad real</span>
        </h2>

        <div id="grid-habitaciones" class="flex flex-col gap-6">
            <div class="flex flex-col items-center justify-center py-20 text-gray-400">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
                <p>Buscando las mejores ofertas en tiempo real...</p>
            </div>
        </div>
    </main>

    <script>
        async function cargarHabitaciones() {
            try {
                // Tu URL de Render (Asegúrate de que sea la correcta)
                const respuesta = await fetch('https://hotel-final-j681.onrender.com/api/rooms');
                const datos = await respuesta.json();

                const contenedor = document.getElementById('grid-habitaciones');
                contenedor.innerHTML = ""; // Limpiar carga

                datos.forEach(hab => {
                    contenedor.innerHTML += `
                        <div class="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden flex flex-col md:flex-row">
                            <div class="md:w-72 h-48 md:h-auto relative overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=600" 
                                     alt="Hotel" class="w-full h-full object-cover">
                                <div class="absolute top-2 left-2 bg-white/90 backdrop-blur px-2 py-1 rounded text-[10px] font-bold uppercase shadow-sm">
                                    Recomendado
                                </div>
                            </div>

                            <div class="p-6 flex-1 flex flex-col justify-between">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h3 class="text-xl font-extrabold text-gray-900 group-hover:text-blue-600 transition">${hab.name}</h3>
                                        <div class="flex items-center gap-1 mt-1 text-orange-400 text-sm">
                                            ★★★★ <span class="text-gray-400 font-normal ml-2">Excelente ubicación</span>
                                        </div>
                                    </div>
                                    <div class="bg-green-100 text-green-700 px-2 py-1 rounded font-bold text-xs">
                                        8.5 / 10
                                    </div>
                                </div>

                                <p class="text-gray-500 text-sm mt-3 leading-relaxed">
                                    ${hab.description || 'Esta habitación cuenta con todas las comodidades modernas, Wi-Fi de alta velocidad y una ubicación privilegiada cerca de los puntos de interés.'}
                                </p>

                                <div class="mt-6 flex flex-col md:flex-row md:items-end justify-between border-t border-gray-50 pt-4 gap-4">
                                    <div class="flex flex-col">
                                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider text-right md:text-left">Precio por noche</span>
                                        <span class="text-3xl font-black text-gray-900">$${hab.price.toLocaleString('es-CO')}</span>
                                    </div>
                                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-all transform hover:scale-105 active:scale-95 shadow-md shadow-blue-100 text-center">
                                        Ver oferta
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('grid-habitaciones').innerHTML = `
                    <div class="bg-red-50 border border-red-100 text-red-600 p-8 rounded-xl text-center">
                        <p class="font-bold">❌ Error al conectar con el servidor</p>
                        <p class="text-sm mt-2 text-red-400">Verifica que tu backend en Render esté activo.</p>
                    </div>
                `;
            }
        }

        cargarHabitaciones();
    </script>
</body>
</html>
